<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate.io 配置编辑器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Gate.io 配置编辑器v1</h1>
        
        <div class="config-section">
            <h2>服务器配置</h2>
            <div class="form-group">
                <label for="server-host">服务器地址:</label>
                <input type="text" id="server-host" name="server-host" readonly>
            </div>
            <div class="form-group">
                <label for="server-port">端口:</label>
                <input type="number" id="server-port" name="server-port" min="1" max="65535" readonly>
            </div>
            <div class="form-group">
                <label for="api-prefix">API路径前缀:</label>
                <input type="text" id="api-prefix" name="api-prefix" readonly>
            </div>
        </div>
        
        <div class="config-section">
            <h2>交易对配置</h2>
            <div id="pairs-container">
                <!-- 交易对配置将在这里动态生成 -->
            </div>
            <button id="add-pair-btn" class="btn">添加交易对</button>
        </div>
        
        <div class="config-section">
            <h2>恐惧与贪婪指数</h2>
            <div class="form-group">
                <label for="fear-greed">当前指数 (0-100):</label>
                <input type="number" id="fear-greed" name="fear-greed" min="0" max="100" value="50">
            </div>
            <div class="fear-greed-display">
                <div class="fear-greed-value" id="fear-greed-value">50</div>
                <div class="fear-greed-label" id="fear-greed-label">中性</div>
            </div>
        </div>
        
        <div class="config-section">
            <h2>CoinMarketCap API 配置</h2>
            <div class="form-group">
                <label for="cmc-api-key">API Key:</label>
                <input type="text" id="cmc-api-key" name="cmc-api-key">
            </div>
        </div>
        
        <div class="config-section">
            <h2>Telegram 配置</h2>
            <div class="form-group">
                <label for="botToken">Bot Token:</label>
                <input type="text" id="botToken" name="botToken">
            </div>
            <div class="form-group">
                <label for="chatID">Chat ID:</label>
                <input type="text" id="chatID" name="chatID">
            </div>
        </div>
        
        <div class="actions">
            <button id="save-btn" class="btn btn-primary">保存配置</button>
            <button id="reload-btn" class="btn">重新加载</button>
        </div>
        
        <div id="notification" class="notification hidden"></div>
    </div>
    
    <script src="api-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
